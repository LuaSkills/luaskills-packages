name: Export Bundle Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runtime-validation:
    name: ${{ matrix.platform }} @ ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # SupportedTargets defines the only runtime platforms this repository validates.
          # SupportedTargets 定义本仓库实际验证的唯一运行时目标集合。
          - platform: windows-x64
            runner: windows-latest
            os: windows
          - platform: linux-x64
            runner: ubuntu-24.04
            os: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - platform: macos-x64
            runner: macos-15-intel
            os: macos
          - platform: macos-arm64
            runner: macos-15
            os: macos

    steps:
      - name: Checkout luaskills-packages
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export package inputs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_catalog.py
          python scripts/export_lua_packages_txt.py
          python scripts/render_rockspec_overrides.py

      - name: Checkout luaskills
        uses: actions/checkout@v4
        with:
          repository: LuaSkills/luaskills
          path: luaskills

      - name: Setup Rust 1.94
        shell: bash
        run: |
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustc --version
          cargo --version

      - name: Sync generated inputs into luaskills
        shell: bash
        run: |
          set -euo pipefail
          python scripts/sync_into_luaskills_repo.py --luaskills-root luaskills

      - name: Build luaskills (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          cargo build --release

      - name: Build luaskills (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          cargo build --release

      - name: Install Lua packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          powershell -ExecutionPolicy Bypass -File scripts\install_lua_deps.ps1

      - name: Install Lua packages (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          bash scripts/install_lua_deps.sh

      - name: Install Lua packages (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install bash
          cd luaskills
          "$(brew --prefix)/bin/bash" scripts/install_lua_deps.sh

      - name: Package lua-deps archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          New-Item -ItemType Directory -Force -Path "target\release-packages" | Out-Null
          $archivePath = (Resolve-Path -LiteralPath "target\release-packages").Path + "\lua-deps-${{ matrix.platform }}.tar.gz"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          Push-Location "third_party\deps"
          try {
            $members = @("openssl", "curl", "zlib", "pcre2", "libyaml")
            tar -czf $archivePath @members
          } finally {
            Pop-Location
          }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $archivePath)" | Set-Content -Path "$archivePath.sha256" -Encoding ascii

      - name: Package lua-deps archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          mkdir -p target/release-packages
          tar -czf "target/release-packages/lua-deps-${{ matrix.platform }}.tar.gz" -C third_party/deps openssl curl zlib pcre2 libyaml
          (cd target/release-packages && sha256sum "lua-deps-${{ matrix.platform }}.tar.gz" > "lua-deps-${{ matrix.platform }}.tar.gz.sha256")

      - name: Package runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          powershell -ExecutionPolicy Bypass -File scripts\package_lua_runtime.ps1 -Platform "${{ matrix.platform }}" -OutputDir "target\release-packages"
          if (-not (Test-Path -LiteralPath "target\release-packages\lua-runtime-${{ matrix.platform }}.tar.gz")) {
            throw "missing runtime package archive"
          }

      - name: Package runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          bash scripts/package_lua_runtime.sh "${{ matrix.platform }}"
          test -f "target/release-packages/lua-runtime-${{ matrix.platform }}.tar.gz"

      - name: Prepare validation release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path validation-release | Out-Null
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-deps-${{ matrix.platform }}.tar.gz" -Destination "validation-release\lua-deps-${{ matrix.platform }}.tar.gz" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-deps-${{ matrix.platform }}.tar.gz.sha256" -Destination "validation-release\lua-deps-${{ matrix.platform }}.tar.gz.sha256" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-runtime-${{ matrix.platform }}.tar.gz" -Destination "validation-release\runtime-validation-${{ matrix.platform }}.tar.gz" -Force
          Copy-Item -LiteralPath "luaskills\scripts\lua_packages.generated-from.json" -Destination "validation-release\runtime-validation-${{ matrix.platform }}.generated-from.json" -Force

      - name: Prepare validation release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p validation-release
          cp "luaskills/target/release-packages/lua-deps-${{ matrix.platform }}.tar.gz" "validation-release/lua-deps-${{ matrix.platform }}.tar.gz"
          cp "luaskills/target/release-packages/lua-deps-${{ matrix.platform }}.tar.gz.sha256" "validation-release/lua-deps-${{ matrix.platform }}.tar.gz.sha256"
          cp "luaskills/target/release-packages/lua-runtime-${{ matrix.platform }}.tar.gz" "validation-release/runtime-validation-${{ matrix.platform }}.tar.gz"
          cp "luaskills/scripts/lua_packages.generated-from.json" "validation-release/runtime-validation-${{ matrix.platform }}.generated-from.json"

      - name: Upload validation runtime archive
        uses: actions/upload-artifact@v4
        with:
          name: luaskills-runtime-validation-${{ matrix.platform }}
          path: |
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz.sha256
            validation-release/runtime-validation-${{ matrix.platform }}.tar.gz
            validation-release/runtime-validation-${{ matrix.platform }}.generated-from.json

      - name: Publish validation release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz.sha256
            validation-release/runtime-validation-${{ matrix.platform }}.tar.gz
            validation-release/runtime-validation-${{ matrix.platform }}.generated-from.json
          generate_release_notes: false

  export:
    name: Export bundle after runtime validation
    needs:
      - runtime-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate catalog
        run: python scripts/validate_catalog.py

      - name: Export compatibility lua_packages.txt
        run: python scripts/export_lua_packages_txt.py

      - name: Render override rockspecs
        run: python scripts/render_rockspec_overrides.py

      - name: Export platform support matrix
        run: python scripts/export_platform_support.py

      - name: Export runtime bundle metadata
        run: python scripts/export_runtime_bundle_metadata.py

      - name: Export third-party notice manifests
        run: python scripts/export_third_party_licenses.py

      - name: Fetch license texts
        run: python scripts/fetch_license_texts.py

      - name: Create bundle archive
        run: |
          bundle_name="luaskills-packages-bundle-${GITHUB_REF_NAME}"
          cd dist
          zip -r "../${bundle_name}.zip" .
          cd ..
          sha256sum "${bundle_name}.zip" > "${bundle_name}.sha256"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luaskills-packages-bundle
          path: |
            dist/
            luaskills-packages-bundle-*.zip
            luaskills-packages-bundle-*.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            luaskills-packages-bundle-*.zip
            luaskills-packages-bundle-*.sha256
            dist/platform-support.json
            dist/platform-support.md
            dist/THIRD_PARTY_LICENSES.json
            dist/THIRD_PARTY_NOTICES.md
          generate_release_notes: true
