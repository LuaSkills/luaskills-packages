name: Export Bundle Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  # Dependency versions stay aligned with the luaskills core build pipeline.
  # 依赖版本与 luaskills 主仓库构建流水线保持一致。
  OPENSSL_VERSION: "3.4.1"
  CURL_VERSION: "8.13.0"
  ZLIB_VERSION: "1.3.1"
  PCRE2_VERSION: "10.45"
  LIBYAML_VERSION: "0.2.5"
  PERL_VERSION: "5.38.2.2"

jobs:
  runtime-validation:
    name: ${{ matrix.platform }} @ ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # SupportedTargets defines the only runtime platforms this repository validates.
          # SupportedTargets 定义本仓库实际验证的唯一运行时目标集合。
          - platform: windows-x64
            runner: windows-latest
            os: windows
          - platform: linux-x64
            runner: ubuntu-24.04
            os: linux
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            os: linux
          - platform: macos-x64
            runner: macos-15-intel
            os: macos
          - platform: macos-arm64
            runner: macos-15
            os: macos

    steps:
      - name: Checkout luaskills-packages
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Export package inputs
        shell: bash
        run: |
          set -euo pipefail
          python scripts/validate_catalog.py
          python scripts/export_lua_packages_txt.py
          python scripts/render_rockspec_overrides.py

      - name: Checkout luaskills
        uses: actions/checkout@v4
        with:
          repository: LuaSkills/luaskills
          path: luaskills

      - name: Setup Rust 1.94
        shell: bash
        run: |
          rustup toolchain install 1.94.0 --profile minimal
          rustup default 1.94.0
          rustc --version
          cargo --version

      - name: Sync generated inputs into luaskills
        shell: bash
        run: |
          set -euo pipefail
          python scripts/sync_into_luaskills_repo.py --luaskills-root luaskills

      - name: Install build tools (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Prepare build tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $missingTools = @()
          foreach ($tool in @("cmake", "ninja", "nasm")) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              $missingTools += $tool
            }
          }

          if ($missingTools.Count -gt 0) {
            choco install -y @missingTools --no-progress
          }

          $perlRoot = Join-Path $env:USERPROFILE ".cache\luaskills\tools\perl\$env:PERL_VERSION"
          $perlBin = Join-Path $perlRoot "perl\bin"
          $perlExe = Join-Path $perlBin "perl.exe"

          if (-not (Test-Path $perlExe)) {
            $perlUrl = "https://github.com/StrawberryPerl/Perl-Dist-Strawberry/releases/download/SP_53822_64bit/strawberry-perl-$env:PERL_VERSION-64bit-portable.zip"
            $perlFallbackUrl = "https://strawberryperl.com/download/$env:PERL_VERSION/strawberry-perl-$env:PERL_VERSION-64bit-portable.zip"
            $perlZip = Join-Path $env:TEMP "strawberry-perl-$env:PERL_VERSION.zip"

            try {
              curl -fSL $perlUrl -o $perlZip
            }
            catch {
              curl -fSL $perlFallbackUrl -o $perlZip
            }

            New-Item -ItemType Directory -Force -Path $perlRoot | Out-Null
            Expand-Archive $perlZip -DestinationPath $perlRoot -Force
          }

          $env:PATH = "$perlBin;$env:PATH"
          Add-Content $env:GITHUB_PATH "$perlBin"

          $nasmPath = "C:\Program Files\NASM"
          if (Test-Path $nasmPath) {
            $env:PATH = "$nasmPath;$env:PATH"
            Add-Content $env:GITHUB_PATH $nasmPath
          }

      - name: Build deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DEPS_DIR: ${{ github.workspace }}\luaskills\third_party\deps
        run: |
          New-Item -ItemType Directory -Force -Path $env:DEPS_DIR | Out-Null

          $url = "https://github.com/openssl/openssl/releases/download/openssl-$env:OPENSSL_VERSION/openssl-$env:OPENSSL_VERSION.tar.gz"
          curl -fSL $url -o openssl.tar.gz
          tar -xzf openssl.tar.gz
          Push-Location "openssl-$env:OPENSSL_VERSION"
          perl Configure VC-WIN64A --prefix="$env:DEPS_DIR\openssl" --openssldir="$env:DEPS_DIR\openssl\ssl" no-tests no-shared
          nmake
          nmake install_sw
          Pop-Location

          $url = "https://github.com/madler/zlib/releases/download/v$env:ZLIB_VERSION/zlib-$env:ZLIB_VERSION.tar.gz"
          curl -fSL $url -o zlib.tar.gz
          tar -xzf zlib.tar.gz
          Push-Location "zlib-$env:ZLIB_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$env:DEPS_DIR\zlib" -DBUILD_SHARED_LIBS=ON
          ninja install
          Pop-Location
          Pop-Location

          $url = "https://curl.se/download/curl-$env:CURL_VERSION.tar.gz"
          curl -fSL $url -o curl.tar.gz
          tar -xzf curl.tar.gz
          Push-Location "curl-$env:CURL_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -GNinja "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_INSTALL_PREFIX=$env:DEPS_DIR\curl" "-DBUILD_SHARED_LIBS=ON" "-DBUILD_STATIC_LIBS=OFF" "-DBUILD_CURL_EXE=OFF" "-DBUILD_TESTING=OFF" "-DBUILD_LIBCURL_DOCS=OFF" "-DCURL_USE_OPENSSL=ON" "-DCURL_ZLIB=ON" "-DCURL_USE_LIBPSL=OFF" "-DOPENSSL_ROOT_DIR=$env:DEPS_DIR\openssl" "-DZLIB_ROOT=$env:DEPS_DIR\zlib"
          ninja install
          Pop-Location
          Pop-Location

          $url = "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-$env:PCRE2_VERSION/pcre2-$env:PCRE2_VERSION.tar.gz"
          curl -fSL $url -o pcre2.tar.gz
          tar -xzf pcre2.tar.gz
          Push-Location "pcre2-$env:PCRE2_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$env:DEPS_DIR\pcre2" -DBUILD_SHARED_LIBS=OFF -DPCRE2_SUPPORT_JIT=ON
          ninja install
          Pop-Location
          Pop-Location

          $url = "https://github.com/yaml/libyaml/archive/refs/tags/$env:LIBYAML_VERSION.tar.gz"
          curl -fSL $url -o libyaml.tar.gz
          tar -xzf libyaml.tar.gz
          Push-Location "libyaml-$env:LIBYAML_VERSION"
          $buildDir = "build"
          New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
          Push-Location $buildDir
          cmake .. -G Ninja "-DCMAKE_BUILD_TYPE=Release" "-DCMAKE_INSTALL_PREFIX=$env:DEPS_DIR\libyaml" "-DBUILD_SHARED_LIBS=OFF" "-DBUILD_TESTING=OFF" "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
          ninja install
          Pop-Location
          Pop-Location

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential cmake perl libperl-dev

      - name: Build deps (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          DEPS_DIR: ${{ github.workspace }}/luaskills/third_party/deps
        run: |
          set -euo pipefail
          mkdir -p "$DEPS_DIR"
          jobs="$(nproc)"

          curl -fSL "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz" | tar xz
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$DEPS_DIR/openssl" --openssldir="$DEPS_DIR/openssl/ssl" --libdir=lib no-tests shared
          make -j"$jobs"
          make install_sw
          cd ..

          curl -fSL "https://github.com/madler/zlib/releases/download/v$ZLIB_VERSION/zlib-$ZLIB_VERSION.tar.gz" | tar xz
          cd "zlib-$ZLIB_VERSION"
          CFLAGS="-fPIC" ./configure --prefix="$DEPS_DIR/zlib"
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://curl.se/download/curl-$CURL_VERSION.tar.gz" | tar xz
          cd "curl-$CURL_VERSION"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$DEPS_DIR/curl" -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF -DBUILD_CURL_EXE=OFF -DBUILD_TESTING=OFF -DBUILD_LIBCURL_DOCS=OFF -DCURL_USE_OPENSSL=ON -DCURL_ZLIB=ON -DCURL_USE_LIBPSL=OFF -DOPENSSL_ROOT_DIR="$DEPS_DIR/openssl" -DZLIB_ROOT="$DEPS_DIR/zlib"
          cmake --build build --parallel "$jobs"
          cmake --install build
          cd ..

          curl -fSL "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-$PCRE2_VERSION/pcre2-$PCRE2_VERSION.tar.gz" | tar xz
          cd "pcre2-$PCRE2_VERSION"
          ./configure --prefix="$DEPS_DIR/pcre2" --enable-jit --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://github.com/yaml/libyaml/releases/download/$LIBYAML_VERSION/yaml-$LIBYAML_VERSION.tar.gz" | tar xz
          cd "yaml-$LIBYAML_VERSION"
          ./configure --prefix="$DEPS_DIR/libyaml" --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

      - name: Install build tools (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install cmake perl bash

      - name: Build deps (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          DEPS_DIR: ${{ github.workspace }}/luaskills/third_party/deps
        run: |
          set -euo pipefail
          mkdir -p "$DEPS_DIR"
          jobs="$(sysctl -n hw.ncpu)"

          curl -fSL "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz" | tar xz
          cd "openssl-$OPENSSL_VERSION"
          ./config --prefix="$DEPS_DIR/openssl" --openssldir="$DEPS_DIR/openssl/ssl" --libdir=lib no-tests shared
          make -j"$jobs"
          make install_sw
          cd ..

          curl -fSL "https://github.com/madler/zlib/releases/download/v$ZLIB_VERSION/zlib-$ZLIB_VERSION.tar.gz" | tar xz
          cd "zlib-$ZLIB_VERSION"
          CFLAGS="-fPIC" ./configure --prefix="$DEPS_DIR/zlib"
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://curl.se/download/curl-$CURL_VERSION.tar.gz" | tar xz
          cd "curl-$CURL_VERSION"
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$DEPS_DIR/curl" -DBUILD_SHARED_LIBS=ON -DBUILD_STATIC_LIBS=OFF -DBUILD_CURL_EXE=OFF -DBUILD_TESTING=OFF -DBUILD_LIBCURL_DOCS=OFF -DCURL_USE_OPENSSL=ON -DCURL_ZLIB=ON -DCURL_USE_LIBPSL=OFF -DOPENSSL_ROOT_DIR="$DEPS_DIR/openssl" -DZLIB_ROOT="$DEPS_DIR/zlib"
          cmake --build build --parallel "$jobs"
          cmake --install build
          cd ..

          curl -fSL "https://github.com/PCRE2Project/pcre2/releases/download/pcre2-$PCRE2_VERSION/pcre2-$PCRE2_VERSION.tar.gz" | tar xz
          cd "pcre2-$PCRE2_VERSION"
          ./configure --prefix="$DEPS_DIR/pcre2" --enable-jit --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

          curl -fSL "https://github.com/yaml/libyaml/releases/download/$LIBYAML_VERSION/yaml-$LIBYAML_VERSION.tar.gz" | tar xz
          cd "yaml-$LIBYAML_VERSION"
          ./configure --prefix="$DEPS_DIR/libyaml" --enable-shared --disable-static
          make -j"$jobs"
          make install
          cd ..

      - name: Verify deps layout
        shell: bash
        run: |
          set -euo pipefail
          for dir in openssl curl zlib pcre2 libyaml; do
            if [ ! -d "luaskills/third_party/deps/$dir" ]; then
              echo "::error::Missing dependency directory: luaskills/third_party/deps/$dir"
              exit 1
            fi
          done

      - name: Build luaskills (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          cargo build --release

      - name: Build luaskills (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          cargo build --release

      - name: Install Lua packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          powershell -ExecutionPolicy Bypass -File scripts\install_lua_deps.ps1

      - name: Install Lua packages (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          bash scripts/install_lua_deps.sh

      - name: Install Lua packages (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          brew install bash
          cd luaskills
          "$(brew --prefix)/bin/bash" scripts/install_lua_deps.sh

      - name: Package lua-deps archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          New-Item -ItemType Directory -Force -Path "target\release-packages" | Out-Null
          $archivePath = (Resolve-Path -LiteralPath "target\release-packages").Path + "\lua-deps-${{ matrix.platform }}.tar.gz"
          if (Test-Path -LiteralPath $archivePath) {
            Remove-Item -LiteralPath $archivePath -Force
          }
          Push-Location "third_party\deps"
          try {
            $members = @("openssl", "curl", "zlib", "pcre2", "libyaml")
            tar -czf $archivePath @members
          } finally {
            Pop-Location
          }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archivePath).Hash.ToLowerInvariant()
          "$hash  $(Split-Path -Leaf $archivePath)" | Set-Content -Path "$archivePath.sha256" -Encoding ascii

      - name: Package lua-deps archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          mkdir -p target/release-packages
          tar -czf "target/release-packages/lua-deps-${{ matrix.platform }}.tar.gz" -C third_party/deps openssl curl zlib pcre2 libyaml
          (cd target/release-packages && sha256sum "lua-deps-${{ matrix.platform }}.tar.gz" > "lua-deps-${{ matrix.platform }}.tar.gz.sha256")

      - name: Package runtime (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-Location luaskills
          powershell -ExecutionPolicy Bypass -File scripts\package_lua_runtime.ps1 -Platform "${{ matrix.platform }}" -OutputDir "target\release-packages"
          if (-not (Test-Path -LiteralPath "target\release-packages\lua-runtime-${{ matrix.platform }}.tar.gz")) {
            throw "missing runtime package archive"
          }

      - name: Package runtime (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          cd luaskills
          bash scripts/package_lua_runtime.sh "${{ matrix.platform }}"
          test -f "target/release-packages/lua-runtime-${{ matrix.platform }}.tar.gz"

      - name: Export formal runtime packages archive
        shell: bash
        run: |
          set -euo pipefail
          python scripts/export_runtime_packages_archive.py \
            --source-archive "luaskills/target/release-packages/lua-runtime-${{ matrix.platform }}.tar.gz" \
            --platform "${{ matrix.platform }}" \
            --output-dir "luaskills/target/release-packages"

      - name: Prepare validation release assets (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path validation-release | Out-Null
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-deps-${{ matrix.platform }}.tar.gz" -Destination "validation-release\lua-deps-${{ matrix.platform }}.tar.gz" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-deps-${{ matrix.platform }}.tar.gz.sha256" -Destination "validation-release\lua-deps-${{ matrix.platform }}.tar.gz.sha256" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-runtime-packages-${{ matrix.platform }}.tar.gz" -Destination "validation-release\lua-runtime-packages-${{ matrix.platform }}.tar.gz" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-runtime-packages-${{ matrix.platform }}.tar.gz.sha256" -Destination "validation-release\lua-runtime-packages-${{ matrix.platform }}.tar.gz.sha256" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-runtime-packages-${{ matrix.platform }}.generated-from.json" -Destination "validation-release\lua-runtime-packages-${{ matrix.platform }}.generated-from.json" -Force
          Copy-Item -LiteralPath "luaskills\target\release-packages\lua-runtime-${{ matrix.platform }}.tar.gz" -Destination "validation-release\runtime-validation-${{ matrix.platform }}.tar.gz" -Force
          Copy-Item -LiteralPath "luaskills\scripts\lua_packages.generated-from.json" -Destination "validation-release\runtime-validation-${{ matrix.platform }}.generated-from.json" -Force

      - name: Prepare validation release assets (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p validation-release
          cp "luaskills/target/release-packages/lua-deps-${{ matrix.platform }}.tar.gz" "validation-release/lua-deps-${{ matrix.platform }}.tar.gz"
          cp "luaskills/target/release-packages/lua-deps-${{ matrix.platform }}.tar.gz.sha256" "validation-release/lua-deps-${{ matrix.platform }}.tar.gz.sha256"
          cp "luaskills/target/release-packages/lua-runtime-packages-${{ matrix.platform }}.tar.gz" "validation-release/lua-runtime-packages-${{ matrix.platform }}.tar.gz"
          cp "luaskills/target/release-packages/lua-runtime-packages-${{ matrix.platform }}.tar.gz.sha256" "validation-release/lua-runtime-packages-${{ matrix.platform }}.tar.gz.sha256"
          cp "luaskills/target/release-packages/lua-runtime-packages-${{ matrix.platform }}.generated-from.json" "validation-release/lua-runtime-packages-${{ matrix.platform }}.generated-from.json"
          cp "luaskills/target/release-packages/lua-runtime-${{ matrix.platform }}.tar.gz" "validation-release/runtime-validation-${{ matrix.platform }}.tar.gz"
          cp "luaskills/scripts/lua_packages.generated-from.json" "validation-release/runtime-validation-${{ matrix.platform }}.generated-from.json"

      - name: Upload validation runtime archive
        uses: actions/upload-artifact@v4
        with:
          name: luaskills-runtime-validation-${{ matrix.platform }}
          path: |
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz.sha256
            validation-release/lua-runtime-packages-${{ matrix.platform }}.tar.gz
            validation-release/lua-runtime-packages-${{ matrix.platform }}.tar.gz.sha256
            validation-release/lua-runtime-packages-${{ matrix.platform }}.generated-from.json
            validation-release/runtime-validation-${{ matrix.platform }}.tar.gz
            validation-release/runtime-validation-${{ matrix.platform }}.generated-from.json

      - name: Publish validation release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz
            validation-release/lua-deps-${{ matrix.platform }}.tar.gz.sha256
            validation-release/lua-runtime-packages-${{ matrix.platform }}.tar.gz
            validation-release/lua-runtime-packages-${{ matrix.platform }}.tar.gz.sha256
            validation-release/lua-runtime-packages-${{ matrix.platform }}.generated-from.json
            validation-release/runtime-validation-${{ matrix.platform }}.tar.gz
            validation-release/runtime-validation-${{ matrix.platform }}.generated-from.json
          generate_release_notes: false

  export:
    name: Export bundle after runtime validation
    needs:
      - runtime-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate catalog
        run: python scripts/validate_catalog.py

      - name: Export compatibility lua_packages.txt
        run: python scripts/export_lua_packages_txt.py

      - name: Render override rockspecs
        run: python scripts/render_rockspec_overrides.py

      - name: Export platform support matrix
        run: python scripts/export_platform_support.py

      - name: Export runtime bundle metadata
        run: python scripts/export_runtime_bundle_metadata.py

      - name: Export third-party notice manifests
        run: python scripts/export_third_party_licenses.py

      - name: Fetch license texts
        run: python scripts/fetch_license_texts.py

      - name: Create bundle archive
        run: |
          bundle_name="luaskills-packages-bundle-${GITHUB_REF_NAME}"
          cd dist
          zip -r "../${bundle_name}.zip" .
          cd ..
          sha256sum "${bundle_name}.zip" > "${bundle_name}.sha256"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luaskills-packages-bundle
          path: |
            dist/
            luaskills-packages-bundle-*.zip
            luaskills-packages-bundle-*.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: |
            luaskills-packages-bundle-*.zip
            luaskills-packages-bundle-*.sha256
            dist/platform-support.json
            dist/platform-support.md
            dist/THIRD_PARTY_LICENSES.json
            dist/THIRD_PARTY_NOTICES.md
          generate_release_notes: true
